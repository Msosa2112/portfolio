<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; }
  .card { position: relative; width: 300px; height: 300px; background: rgba(255,0,0,0.5); backdrop-filter: blur(10px); }
  .media { position: relative; width: 100%; height: 200px; -webkit-mask-image: url(#test-mask); mask-image: url(#test-mask); }
  .media img { width: 100%; height: 100%; object-fit: cover; }
  .label { position: absolute; bottom: 0; left: 0; width: 100px; height: 50px; background: transparent; color: white; display:flex; align-items:center; justify-content:center; }
  .corner { position: absolute; top: -20px; right: 0; width: 20px; height: 20px; background: transparent; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;">
    <mask id="test-mask">
      <rect x="0" y="0" width="100%" height="100%" fill="white" />
      
      <!-- Label rect: x=0, y=150, w=100, h=50 -->
      <rect x="0" y="150" width="100" height="50" fill="black" />
      
      <!-- Corner top-right of label: x=100, y=180, size=20 -->
      <!-- Wait, the corner is IN the label, at top-right. -->
      <!-- If label is at left:0, bottom:0. The corner is at left:100, bottom:0. -->
      <!-- So x=100, y=180, w=20, h=20 -->
      <rect x="100" y="180" width="20" height="20" fill="black" />
      <!-- Circle center top-right of the corner square. Wait, if it is a bottom-left cutout, it connects to the bottom. -->
      <!-- clip="bottom-left" means the solid part curves from bottom to left. -->
      <!-- so the circle is at top-right of the corner square: cx = x+20, cy = y -->
      <circle cx="120" cy="180" r="20" fill="white" />
    </mask>
  </svg>
  <div class="card">
    <div class="media">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=2371&auto=format&fit=crop" />
      <div class="label">
        <div class="corner"></div>
        Featured
      </div>
    </div>
  </div>
</body>
</html>

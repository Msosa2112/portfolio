<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; }
  .card { position: relative; width: 300px; height: 300px; background: rgba(255,0,0,0.5); backdrop-filter: blur(10px); }
  .media { position: relative; width: 100%; height: 200px; -webkit-mask-image: url(#test-mask); mask-image: url(#test-mask); }
  .media img { width: 100%; height: 100%; object-fit: cover; }
  .label { position: absolute; bottom: 0; left: 0; padding: 20px; background: transparent; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;">
    <mask id="test-mask" x="0" y="0" width="100%" height="100%" maskUnits="objectBoundingBox">
      <rect x="0" y="0" width="1" height="1" fill="white" />
      <foreignObject x="0" y="0" width="1" height="1">
        <div xmlns="http://www.w3.org/1999/xhtml" style="position: relative; width: 300px; height: 200px;">
          <div style="position: absolute; bottom: 0; left: 0; width: 100px; height: 50px; background: black; color: black;">
            Featured
          </div>
        </div>
      </foreignObject>
    </mask>
  </svg>
  <div class="card">
    <div class="media">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=2371&auto=format&fit=crop" />
      <div class="label">Featured</div>
    </div>
  </div>
</body>
</html>
